kind = "mobile"
previewPath = "/"
title = "MKS Education Service"
version = "1.0.0"
id = "artifacts/mks-app"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 20878

[services.development]
run = "pnpm --filter @workspace/mks-app run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/mks-app", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/mks-app", "run", "serve" ]

[services.env]
PORT = "20878"
BASE_PATH = "/"
